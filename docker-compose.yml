# docker-compose.yml
# -------------------
# Full MLOps stack for Surface Defect Detection
#
# Services:
#   1. mlflow        - Experiment tracking     (port 5000)
#   2. streamlit     - Frontend UI + /metrics  (port 8501 + 8000)
#   3. prometheus    - Metrics scraping         (port 9090)
#   4. alertmanager  - Alert routing            (port 9093)
#   5. grafana       - Dashboards               (port 3001)
#   6. airflow       - Pipeline orchestration   (port 8081)

services:

  # ── FIX 1: Use official mlflow image (binds to 0.0.0.0 correctly) ─────────
  # python:3.10-slim + pip install was binding gunicorn to 127.0.0.1,
  # making the port unreachable from Docker host even though it was mapped.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: mlflow
    working_dir: /mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - defect_net

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    container_name: streamlit
    environment:
      - PYTHONPATH=/app
      - MODEL_PATH=/app/models
      - PROCESSED_DATA_DIR=/app/data/processed
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./data:/app/data
      - ./params.yaml:/app/params.yaml
      - ./reports:/app/reports
    ports:
      - "8501:8501"
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_healthy       # wait until mlflow is truly ready
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8501/_stcore/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - defect_net

  # ── FIX 2: Wait for streamlit to be healthy before starting ───────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    depends_on:
      streamlit:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - defect_net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - defect_net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - defect_net

  # ── FIX 3: Pre-bake deps via Dockerfile, fix db migrate + sequencing ──────
  airflow:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__WEBSERVER__SECRET_KEY=defect-detection-secret-key
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - PYTHONPATH=/opt/airflow
      - RAW_DATA_DIR=/app/data/raw/mvtec_ad
      - PROCESSED_DATA_DIR=/app/data/processed
    volumes:
      - ./src/pipeline:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/app/data
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8081:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin --password admin
          --firstname Admin --lastname User
          --role Admin --email admin@example.com 2>/dev/null || true &&
        airflow scheduler &
        exec airflow webserver --port 8080
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - defect_net

volumes:
  mlflow_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  airflow_logs:

networks:
  defect_net:
    driver: bridge
