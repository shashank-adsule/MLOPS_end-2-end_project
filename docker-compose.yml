# docker-compose.yml
services:

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: mlflow
    working_dir: /mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - defect_net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - defect_net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - defect_net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - defect_net

  # ── Postgres: replaces SQLite for Airflow (SQLite breaks under concurrency)
  postgres:
    image: postgres:15-alpine
    container_name: airflow_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - defect_net

  airflow:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__WEBSERVER__SECRET_KEY=defect-detection-secret-key
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL=30
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=300
      - PYTHONPATH=/opt/airflow
      - RAW_DATA_DIR=/app/data/raw/mvtec_ad
      - PROCESSED_DATA_DIR=/app/data/processed
    volumes:
      - ./src/pipeline:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/app/data
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        echo '>>> Initializing Airflow DB...' &&
        airflow db migrate &&
        echo '>>> Creating admin user...' &&
        airflow users create
          --username admin --password admin
          --firstname Admin --lastname User
          --role Admin --email da25m005@2002@gmail.com 2>/dev/null || true &&
        echo '>>> Starting scheduler in background...' &&
        airflow scheduler &
        echo '>>> Waiting 20s for scheduler...' &&
        sleep 20 &&
        echo '>>> Starting webserver...' &&
        exec airflow webserver --port 8080
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    networks:
      - defect_net

volumes:
  mlflow_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  airflow_logs:
  postgres_data:        # ← new

networks:
  defect_net:
    driver: bridge