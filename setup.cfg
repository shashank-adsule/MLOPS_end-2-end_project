[flake8]
max-line-length = 120

extend-ignore =
    E221,
    E402,
    W503,
    E501,
    F541,
    E272,

per-file-ignores =
    src/app.py:F401,E401,E302,E303,E305,E301,E231,E701,W292,F841
    src/model/__init__.py:F401,W292
    src/model/evaluate.py:F401,E302,W292
    src/model/patchcore.py:E302,W292
    src/model/train.py:F401,E302,W292
    src/pipeline/airflow_dag.py:F401
    src/pipeline/app_down_response_dag.py:F401,E302
    src/pipeline/ingest.py:F401
    src/pipeline/preprocess.py:W292
    tests/conftest.py:F401
    tests/test_evaluate.py:F401
    tests/test_ingest.py:F401
    tests/test_patchcore.py:F401
    tests/test_preprocess.py:F401

exclude =
    .git,
    __pycache__,
    E2E,
    .venv,
    venv,
    data,
    models,
    reports,
    mlruns,
