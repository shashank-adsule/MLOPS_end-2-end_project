# monitoring/prometheus.yml
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:

  # Scrape Prometheus metrics from Streamlit app
  # Streamlit exposes /metrics on port 8000 via prometheus_client
  - job_name: "defect-app"
    static_configs:
      - targets: ["streamlit:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # MLflow health check
  - job_name: "mlflow"
    static_configs:
      - targets: ["mlflow:5000"]
    metrics_path: /health
    scrape_interval: 30s