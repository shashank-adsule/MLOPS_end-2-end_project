# monitoring/prometheus.yml
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:

  # Scrapes your LOCAL Streamlit running on Windows host port 8000
  # host.docker.internal = Windows host machine from inside Docker
  - job_name: "defect-app"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "mlflow"
    static_configs:
      - targets: ["mlflow:5000"]
    metrics_path: /
    scrape_interval: 30s
    metric_relabel_configs:
      - source_labels: [__name__]
        action: drop
        regex: ".*"