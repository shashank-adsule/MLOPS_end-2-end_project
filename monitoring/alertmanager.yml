# monitoring/alertmanager.yml
# ----------------------------
# Alertmanager routes alerts from Prometheus to receivers.
# Currently configured to log alerts (null receiver).
# Add email/slack config below for real notifications.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 12h
  receiver: 'default'

  routes:
    # Critical alerts fire immediately
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts grouped
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 4h

receivers:

  - name: 'default'
    # Logs alert — replace with email/slack below
    webhook_configs:
      - url: 'http://localhost:9093/api/v2/alerts'
        send_resolved: true

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://localhost:9093/api/v2/alerts'
        send_resolved: true

  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://localhost:9093/api/v2/alerts'
        send_resolved: true

  # Uncomment to add email notifications:
  # - name: 'email-alerts'
  #   email_configs:
  #     - to: 'your-email@example.com'
  #       from: 'alertmanager@example.com'
  #       smarthost: 'smtp.gmail.com:587'
  #       auth_username: 'your-email@gmail.com'
  #       auth_password: 'your-app-password'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
